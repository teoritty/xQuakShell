name: pluginsdk

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'pkg/pluginsdk/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pkg/pluginsdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go test ./...
