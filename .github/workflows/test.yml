name: Test



on:

  push:

    branches: [main, master]

  pull_request:



jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4



      - uses: actions/setup-go@v5

        with:

          go-version: '1.25'



      - name: Build reference plugins

        run: make plugins



      - name: Layer import check
        shell: pwsh
        run: ./scripts/check-imports.ps1

      - name: Filesystem boundary check
        shell: pwsh
        run: ./scripts/check-fs-boundaries.ps1

      - name: Unit tests

        run: go test ./... -race -count=1



      - name: Plugin coverage gates

        run: bash scripts/check-plugin-coverage.sh



      - name: Benchmark smoke

        run: go test ./test/bench/... -bench=. -benchtime=100ms

